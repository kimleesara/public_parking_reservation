<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공공기관 주차 예약 시스템</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { color: #2c3e50; }
    .section { background: #f4f6f8; border-radius: 8px; padding: 20px; margin: 20px 0; }
    h2 { color: #3498db; }
  </style>
</head>
<body>
  <h1>🅿️ 공공기관 주차 자리 예약 시스템</h1>
  <p>도서관, 시청, 박물관 등 공공기관 방문 시 주차 공간을 미리 예약하는 서비스입니다.</p>

  <div class="section">
    <h2>주요 기능</h2>
    <ul>
      <li>실시간 주차 가능 여부 확인</li>
      <li>날짜·시간·자리 단위 예약</li>
      <li>예약 내역 확인 및 취소</li>
      <li>QR코드 기반 입·출차 관리</li>
    </ul>
  </div>

  <div class="section">
    <h2>사용 대상</h2>
    <p>도서관 이용자, 시청 방문자, 박물관 관람객 등 공공기관 방문 예정자</p>
  </div>
